<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Space VR Math</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-environment-component@1.3.1/dist/aframe-environment-component.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }
  </style>
</head>

<body>

<!-- UI OVERLAY -->
<div id="nameInputContainer" style="
  position:absolute; width:100%; height:100%;
  background: radial-gradient(circle, #050814, #000000);
  color:white;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:10;
">
  <h2>🌌 Welcome to Space VR Math</h2>
  <input id="playerNameInput" placeholder="Enter your name..."
    style="padding:10px; font-size:18px; border-radius:8px;">
  <button onclick="startApp()"
    style="margin-top:10px; padding:10px 20px; font-size:18px;">
    Launch Into Space 🚀
  </button>
</div>

<!-- VR SCENE -->
<a-scene>

  <!-- SPACE BACKGROUND -->
  <a-sky color="#000008"></a-sky>

  <!-- STAR FIELD -->
  <a-entity id="stars"></a-entity>

  <!-- FLOATING PLANETS -->
  <a-sphere position="-4 3 -8" radius="1.2" color="#3F51B5"></a-sphere>
  <a-sphere position="4 2 -10" radius="1.5" color="#FF9800"></a-sphere>
  <a-sphere position="0 5 -12" radius="2" color="#9C27B0"></a-sphere>

  <!-- LIGHTING -->
  <a-light type="ambient" color="#888"></a-light>
  <a-light type="point" intensity="1.2" position="0 5 0"></a-light>

  <!-- CAMERA -->
  <a-entity camera look-controls position="0 1.6 0">

    <a-entity
      cursor="fuse: true; fuseTimeout: 1200"
      position="0 0 -1"
      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.035"
      material="color: white; shader: flat">
    </a-entity>

  </a-entity>

  <!-- TITLE -->
  <a-text value="🌌 Space VR Math"
          position="-1 2 -4"
          color="white"
          width="6"></a-text>

  <!-- START BUTTON -->
  <a-entity id="startButton"
            geometry="primitive: box; height: 0.6; width: 1.8; depth: 0.3"
            position="0 1 -4"
            material="color: #00E5FF; emissive: #00E5FF"
            onclick="startGame()">
    <a-text value="START MISSION"
            align="center"
            color="black"
            position="0 0 0.3"
            width="5"></a-text>
  </a-entity>

  <!-- GRADE BUTTONS -->
  <a-entity id="grade8Btn" visible="false"
            geometry="primitive: box; height: 0.5; width: 1.5; depth: 0.3"
            position="-1.5 1 -4"
            material="color: #2196F3"
            onclick="selectGrade(8)">
    <a-text value="GRADE 8" color="white" position="0 0 0.3"></a-text>
  </a-entity>

  <a-entity id="grade9Btn" visible="false"
            geometry="primitive: box; height: 0.5; width: 1.5; depth: 0.3"
            position="1.5 1 -4"
            material="color: #9C27B0"
            onclick="selectGrade(9)">
    <a-text value="GRADE 9" color="white" position="0 0 0.3"></a-text>
  </a-entity>

  <!-- QUESTION -->
  <a-text id="questionText"
          value=""
          position="-1 1.8 -4"
          color="white"
          width="6"
          visible="false"></a-text>

  <!-- OPTIONS (floating holograms) -->
  <a-entity id="option1" visible="false"
            geometry="primitive: box; height: 0.5; width: 1; depth: 0.3"
            position="-2 0.6 -4"
            material="color: #FF9800; emissive: #FF9800"
            onclick="selectAnswer(0)">
    <a-text id="text1" color="black" position="0 0 0.3"></a-text>
  </a-entity>

  <a-entity id="option2" visible="false"
            geometry="primitive: box; height: 0.5; width: 1; depth: 0.3"
            position="0 0.6 -4"
            material="color: #3F51B5; emissive: #3F51B5"
            onclick="selectAnswer(1)">
    <a-text id="text2" color="white" position="0 0 0.3"></a-text>
  </a-entity>

  <a-entity id="option3" visible="false"
            geometry="primitive: box; height: 0.5; width: 1; depth: 0.3"
            position="2 0.6 -4"
            material="color: #009688; emissive: #009688"
            onclick="selectAnswer(2)">
    <a-text id="text3" color="white" position="0 0 0.3"></a-text>
  </a-entity>

</a-scene>

</body>

<script>
/* 🌟 SIMPLE STAR GENERATOR */
const stars = document.querySelector("#stars");

for (let i = 0; i < 200; i++) {
  const star = document.createElement("a-sphere");
  star.setAttribute("radius", 0.03);
  star.setAttribute("color", "white");
  star.setAttribute("position", {
    x: (Math.random() - 0.5) * 50,
    y: (Math.random() - 0.5) * 50,
    z: (Math.random() - 0.5) * 50
  });
  stars.appendChild(star);
}
</script>

</html>

</body>
